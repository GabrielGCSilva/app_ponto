workflows:
  android-release:
    name: Android Release
    instance_type: linux  # mais barato e rápido que macOS
    environment:
      flutter: stable
      groups:
        - firebase_credentials
    scripts:
      - name: Install dependencies
        script: flutter pub get
      
      - name: Build Android
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/apk/release/*.apk
    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        android:
          app_id: "1:331527965536:android:39d8cc095f6152f62fec05"
          groups: 
            - "androidTesters"
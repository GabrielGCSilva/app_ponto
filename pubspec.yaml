publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase Core
  firebase_core: ^3.12.1

  # 📊 Cloud Firestore
  cloud_firestore: ^5.6.5

  # 🖼️ Cloud Storage
  firebase_storage: ^12.4.4

  # 🔐 Authentication
  firebase_auth: ^5.5.1

  # 📦 Utilitários

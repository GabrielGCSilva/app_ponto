name: app_ponto
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

    # 🔥 Firebase Core (sempre necessário)
  firebase_core: ^3.12.1

  # 📊 Cloud Firestore (banco de dados)
  cloud_firestore: ^5.6.5

  # 🖼️ Cloud Storage (para fotos)
  firebase_storage: ^12.4.4

  # 🔐 Authentication (login)
  firebase_auth: ^5.5.1  

  # Dependências do projeto
  image_picker: ^1.0.4

  intl: ^0.20.2

  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  provider: ^6.1.5+1
  dio: ^5.9.2
  location: ^8.0.1
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true